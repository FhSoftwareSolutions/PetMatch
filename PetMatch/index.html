<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PetMatch — encontre seu próximo melhor amigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF3E9;
    --ink:#241B2F;
    --coral:#FF6B5E;
    --coral-deep:#E8473A;
    --mint:#19B6A3;
    --sun:#FFC94B;
    --muted:#9A8FA6;
    --card-shadow: 0 18px 40px -12px rgba(36,27,47,.35);
    --safe: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #FFE0CF 0%, var(--bg) 60%);
    display:flex;justify-content:center;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  .app{
    width:100%;max-width:430px;height:100dvh;
    display:flex;flex-direction:column;position:relative;
  }
  /* Topbar */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px 8px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-family:'Baloo 2';font-weight:800;font-size:24px;letter-spacing:-.5px}
  .brand .pin{color:var(--coral)}
  .brand b{color:var(--ink)}
  .brand i{color:var(--mint);font-style:normal}
  .icon-btn{
    width:42px;height:42px;border:none;border-radius:14px;
    background:#fff;box-shadow:0 4px 14px rgba(36,27,47,.08);
    font-size:18px;cursor:pointer;display:grid;place-items:center;color:var(--ink)
  }
  /* Deck */
  .deck-wrap{flex:1;position:relative;padding:8px 16px}
  .deck{position:absolute;inset:8px 16px}
  .card{
    position:absolute;inset:0;border-radius:28px;overflow:hidden;
    box-shadow:var(--card-shadow);background:#fff;
    will-change:transform;touch-action:none;cursor:grab;
    transform-origin:center 120%;
  }
  .card:active{cursor:grabbing}
  .card .photo{
    height:100%;width:100%;position:relative;
    display:flex;align-items:flex-end;
  }
  .emoji{
    position:absolute;inset:0;display:grid;place-items:center;
    font-size:140px;filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
    user-select:none;pointer-events:none;
  }
  .scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 45%,rgba(20,12,28,.78) 100%);
  }
  .info{position:relative;padding:22px;color:#fff;width:100%}
  .info h2{font-family:'Baloo 2';font-weight:700;font-size:28px;line-height:1.05}
  .info h2 span{font-weight:600;font-size:20px;opacity:.92}
  .info .meta{display:flex;align-items:center;gap:6px;font-weight:700;opacity:.92;margin-top:4px;font-size:14px}
  .info .bio{margin-top:8px;font-size:14px;opacity:.92;font-weight:600;line-height:1.35}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .tag{background:rgba(255,255,255,.22);backdrop-filter:blur(4px);padding:5px 11px;border-radius:999px;font-size:12px;font-weight:800}
  /* stamps */
  .stamp{
    position:absolute;top:34px;padding:6px 16px;border:4px solid;border-radius:12px;
    font-family:'Baloo 2';font-weight:800;font-size:30px;text-transform:uppercase;
    opacity:0;transform:rotate(-12deg);letter-spacing:1px;
  }
  .stamp.like{left:26px;color:var(--mint);border-color:var(--mint);transform:rotate(-16deg)}
  .stamp.nope{right:26px;color:var(--coral);border-color:var(--coral);transform:rotate(16deg)}
  /* Actions */
  .actions{
    display:flex;align-items:center;justify-content:center;gap:18px;
    padding:14px 0 calc(20px + var(--safe));
  }
  .fab{
    border:none;border-radius:50%;cursor:pointer;display:grid;place-items:center;
    background:#fff;box-shadow:0 8px 22px rgba(36,27,47,.16);transition:transform .12s ease;
  }
  .fab:active{transform:scale(.9)}
  .fab.sm{width:52px;height:52px;font-size:20px}
  .fab.lg{width:68px;height:68px;font-size:28px}
  .fab.nope{color:var(--coral)}
  .fab.like{color:var(--mint)}
  .fab.rewind{color:var(--sun)}
  .fab.info{color:#7C8BFF}
  /* Empty state */
  .empty{
    position:absolute;inset:8px 16px;border-radius:28px;background:#fff;
    box-shadow:var(--card-shadow);display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;gap:10px;
  }
  .empty.show{display:flex}
  .empty .big{font-size:64px}
  .empty h3{font-family:'Baloo 2';font-size:24px}
  .empty p{color:var(--muted);font-weight:600;max-width:240px}
  .empty button{margin-top:8px;border:none;background:var(--coral);color:#fff;font-weight:800;
    font-family:'Baloo 2';font-size:16px;padding:12px 24px;border-radius:14px;cursor:pointer}
  /* Match modal */
  .overlay{
    position:absolute;inset:0;z-index:50;display:none;
    background:radial-gradient(120% 90% at 50% 30%,rgba(255,107,94,.96),rgba(25,182,163,.96));
    flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:30px;
    animation:fade .25s ease;
  }
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .title{font-family:'Baloo 2';font-weight:800;font-size:46px;line-height:1;text-shadow:0 4px 12px rgba(0,0,0,.2)}
  .overlay .sub{font-weight:700;margin-top:10px;font-size:17px;max-width:260px;opacity:.95}
  .matchface{font-size:120px;margin-bottom:6px;animation:pop .4s cubic-bezier(.2,1.5,.4,1)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .overlay .row{display:flex;flex-direction:column;gap:10px;margin-top:26px;width:100%;max-width:280px}
  .overlay .primary{background:#fff;color:var(--coral-deep);border:none;font-family:'Baloo 2';
    font-weight:800;font-size:16px;padding:14px;border-radius:14px;cursor:pointer}
  .overlay .ghost{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.7);
    font-weight:800;font-size:15px;padding:12px;border-radius:14px;cursor:pointer}
  @media (prefers-reduced-motion: reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="pin">🐾</span><b>Pet</b><i>Match</i></div>
    <button class="icon-btn" id="resetBtn" title="Recomeçar">↻</button>
  </header>

  <div class="deck-wrap">
    <div class="deck" id="deck"></div>
    <div class="empty" id="empty">
      <div class="big">🦴</div>
      <h3>Por enquanto é só!</h3>
      <p>Você viu todos os pets perto de você. Volte mais tarde ou amplie sua busca.</p>
      <button id="emptyReset">Ver de novo</button>
    </div>
  </div>

  <div class="actions">
    <button class="fab sm rewind" id="btnRewind" title="Voltar">↩</button>
    <button class="fab lg nope" id="btnNope" title="Passar">✕</button>
    <button class="fab sm info" id="btnInfo" title="Detalhes">ℹ</button>
    <button class="fab lg like" id="btnLike" title="Curtir">♥</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="matchface" id="matchFace">🐶</div>
    <div class="title">É um Match!</div>
    <div class="sub" id="matchSub">Você e o pet se curtiram.</div>
    <div class="row">
      <button class="primary" id="msgBtn">Falar com o tutor</button>
      <button class="ghost" id="keepBtn">Continuar buscando</button>
    </div>
  </div>
</div>

<script>
const PETS = [
  {name:"Thor", age:"2 anos", type:"Cão • SRD", dist:"1,2 km", emoji:"🐶", bg:["#FFB36B","#FF6B5E"], bio:"Energético, adora correr no parque e biscoito de fígado.", tags:["Brincalhão","Vacinado","Castrado"]},
  {name:"Mel", age:"1 ano", type:"Gata • Siamês", dist:"800 m", emoji:"🐱", bg:["#8E7CFF","#5B7CFF"], bio:"Tranquila, dorme no colo e detesta segunda-feira.", tags:["Dócil","Vermifugada","Apartamento"]},
  {name:"Bóris", age:"4 anos", type:"Cão • Labrador", dist:"3,5 km", emoji:"🦮", bg:["#19B6A3","#0E8C7E"], bio:"Mestre em buscar a bolinha. Não devolve sempre.", tags:["Sociável","Porte grande","Idosos OK"]},
  {name:"Frida", age:"6 meses", type:"Gata • SRD", dist:"2,1 km", emoji:"🐈", bg:["#FF8FB1","#E8473A"], bio:"Filhote curiosa, vai investigar cada canto da casa.", tags:["Filhote","Esperta","Castração futura"]},
  {name:"Pingo", age:"3 anos", type:"Cão • Beagle", dist:"4,0 km", emoji:"🐕", bg:["#FFC94B","#F2933B"], bio:"Faro afiado e orelhas enormes. Late pouco, ama comer.", tags:["Carinhoso","Vacinado","Crianças OK"]},
  {name:"Nina", age:"2 anos", type:"Gata • Persa", dist:"1,7 km", emoji:"😺", bg:["#7CD4FF","#3B8DF2"], bio:"Rainha da casa. Aceita servos dispostos a escovar o pelo.", tags:["Calma","Pelo longo","Indoor"]},
];

const deck = document.getElementById('deck');
const empty = document.getElementById('empty');
const overlay = document.getElementById('overlay');
let order = [...PETS.keys()];
let history = [];

function buildCards(){
  deck.innerHTML='';
  empty.classList.toggle('show', order.length===0);
  // render up to 3 cards, top one last in DOM
  const slice = order.slice(0,3).reverse();
  slice.forEach((idx,i)=>{
    const p = PETS[idx];
    const depth = slice.length-1-i; // 0 = top
    const el = document.createElement('div');
    el.className='card';
    el.dataset.idx = idx;
    el.style.transform = `translateY(${depth*10}px) scale(${1-depth*0.04})`;
    el.style.zIndex = 10-depth;
    el.innerHTML = `
      <div class="photo" style="background:linear-gradient(150deg,${p.bg[0]},${p.bg[1]})">
        <div class="emoji">${p.emoji}</div>
        <div class="scrim"></div>
        <div class="stamp like">Adotar</div>
        <div class="stamp nope">Passar</div>
        <div class="info">
          <h2>${p.name} <span>${p.age}</span></h2>
          <div class="meta">📍 ${p.dist} • ${p.type}</div>
          <div class="bio">${p.bio}</div>
          <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
    deck.appendChild(el);
    if(depth===0) attachDrag(el);
  });
}

function attachDrag(card){
  let startX=0,startY=0,dx=0,dy=0,dragging=false;
  const like=card.querySelector('.like'), nope=card.querySelector('.nope');
  const down=e=>{dragging=true;startX=e.clientX;startY=e.clientY;card.style.transition='none';card.setPointerCapture(e.pointerId)};
  const move=e=>{
    if(!dragging)return;
    dx=e.clientX-startX;dy=e.clientY-startY;
    const rot=dx/18;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
    const r=Math.min(Math.abs(dx)/120,1);
    like.style.opacity = dx>0?r:0;
    nope.style.opacity = dx<0?r:0;
  };
  const up=()=>{
    if(!dragging)return;dragging=false;
    if(Math.abs(dx)>110){ swipe(dx>0?'like':'nope'); }
    else{ card.style.transition='transform .25s ease';card.style.transform='';like.style.opacity=0;nope.style.opacity=0; }
    dx=dy=0;
  };
  card.addEventListener('pointerdown',down);
  card.addEventListener('pointermove',move);
  card.addEventListener('pointerup',up);
  card.addEventListener('pointercancel',up);
}

function swipe(dir){
  const top = deck.querySelector('.card[style*="z-index: 10"], .card:last-child');
  const card = [...deck.children].reduce((a,b)=> (+b.style.zIndex>+(a?.style.zIndex||0))?b:a, null);
  if(!card) return;
  const idx = +card.dataset.idx;
  const toX = dir==='like'? 600 : -600;
  card.style.transition='transform .4s ease';
  card.style.transform=`translate(${toX}px,${ -40}px) rotate(${dir==='like'?28:-28}deg)`;
  history.push(order[0]);
  order.shift();
  setTimeout(()=>{
    buildCards();
    if(dir==='like' && Math.random()<0.55) showMatch(PETS[idx]);
  }, 280);
}

function showMatch(pet){
  document.getElementById('matchFace').textContent = pet.emoji;
  document.getElementById('matchSub').textContent = `Você e ${pet.name} se curtiram. Que tal dar um lar pra ele?`;
  overlay.classList.add('show');
}

// Buttons
document.getElementById('btnLike').onclick=()=>order.length&&swipe('like');
document.getElementById('btnNope').onclick=()=>order.length&&swipe('nope');
document.getElementById('btnInfo').onclick=()=>{const c=deck.querySelector('.card:last-child');c&&c.querySelector('.bio').scrollIntoView()};
document.getElementById('btnRewind').onclick=()=>{
  if(!history.length)return;
  order.unshift(history.pop());
  buildCards();
};
function reset(){order=[...PETS.keys()];history=[];overlay.classList.remove('show');buildCards();}
document.getElementById('resetBtn').onclick=reset;
document.getElementById('emptyReset').onclick=reset;
document.getElementById('keepBtn').onclick=()=>overlay.classList.remove('show');
document.getElementById('msgBtn').onclick=()=>overlay.classList.remove('show');

buildCards();
</script>
</body>
</html>
