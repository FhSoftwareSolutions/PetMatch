# PetMatch - Ambiente de desenvolvimento local
#
# Uso:
#   docker compose up -d                 # só o MongoDB (combina com `npm run dev`)
#   docker compose --profile full up -d  # stack completa (mongo + api + motor + web)
#   docker compose down                  # para os containers (mantém os dados)
#   docker compose down -v               # para e APAGA os dados

services:
  mongodb:
    image: mongo:latest
    container_name: petmatch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - petmatch-mongo-data:/data/db
    # Ambiente local sem autenticação complexa para facilitar o desenvolvimento.
    # Em produção, defina MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD
    # e use uma connection string com credenciais.

  recommendation-engine:
    build: ./recommendation-engine
    profiles: ["full"]
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: petmatch
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  backend-api:
    build: ./backend-api
    profiles: ["full"]
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongodb:27017/petmatch
      AI_ENGINE_URL: http://recommendation-engine:8000
      PORT: "3000"
      JWT_SECRET: dev-secret-change-me
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - recommendation-engine

  web-app:
    build: ./web-app
    profiles: ["full"]
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend-api

volumes:
  petmatch-mongo-data:
    driver: local
